# React Frontend Configuration

[ui]
api_base              = ""
ms_per_sec            = 1000
staleness_secs        = 120
colours               = ["#2196F3", "#4CAF50", "#FF9800", "#F44336", "#9C27B0", "#00BCD4", "#FF5722", "#607D8B"]
colour_opacity_fill   = "22"
colour_opacity_border = "55"
colour_opacity_bg     = "11"

[system]
source          = "local"
snapshot_limit  = 5000

[transport]
source         = "transport_api"
snapshot_limit = 3000
initial_limit  = 20000
max_snapshots  = 20000

[transport.map]
centre_lat = 52.6638
centre_lng = -8.6267
zoom       = 13
height_px  = 500

[transport.route]
min_move_m     = 30    # deduplicate GPS pings closer than this (metres)
max_points     = 90    # max waypoints per Roads API call (hard limit: 100)
batch_size     = 10    # parallel Roads API calls per batch
stroke_weight  = 3
stroke_opacity = 0.75

[mobile_app]
source         = "mobile_app"
snapshot_limit = 1000
poll_interval  = 5000

# Data Collector and Upload Queue Configuration

[logging]
# Logging level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
level = "INFO"
file = "logger/logs/system_metrics.log"
format = "%(asctime)s - %(levelname)s - %(name)s - %(message)s"

# Enable console output for exports
console_export = true

# JSON output indentation (number of spaces, 0 for compact)
json_indent = 2

[data_model]
# Path to the JSON schema file that defines the message format
schema_path = "data_model.json"

[collectors]
# Default collection interval in seconds (fallback if not specified per-collector)
default_interval = 60
default_collection_interval = 60

# CPU sampling interval in seconds for accuracy
cpu_sample_interval = 1.0

# Decimal precision for rounding metrics
metric_precision = 1

[local_collector]
# Set to false to disable this collector
# enabled = false
# How often to collect local system metrics (seconds)
collection_interval = 10

[transport_collector]
# Set to false to disable this collector
enabled = false
# How often to collect transport metrics (seconds)
collection_interval = 60

# Vehicle positions API endpoint
api_url = "https://api.nationaltransport.ie/gtfsr/v2/Vehicles?format=json"

# Trip updates API endpoint
tripupdates_url = "https://api.nationaltransport.ie/gtfsr/v2/TripUpdates?format=json"

[mobile_app_collector]
# How often to collect mobile device metrics (seconds)
collection_interval = 60
# Max rows fetched from device_stats per cycle — prevents full table scans
query_limit = 30

[aggregator]
# Human-readable name for this aggregator (machine running run_all.py)
name = "Aoibheann'sLaptop"

[upload_queue]
# Redis-based persistent upload queue
implementation = "redis"

# Redis connection settings (for RedisUploadQueue)
redis_host = "localhost"
redis_port = 6379
redis_db = 0
# redis_password = "your_password_here"  # Uncomment if Redis requires authentication

# Database API endpoint (where messages are uploaded)
api_endpoint = "http://100.67.157.90:5000/api/metrics"

# Base URL for device/aggregator registration endpoints
registration_base_url = "http://100.67.157.90:5000"
# api_key = "your_api_key_here"  # Uncomment to add API key authentication

# Upload retry policy
max_retry_attempts = 5
backoff_base = 1              # Base delay in seconds (1s, 2s, 4s, 8s, 16s with multiplier=2)
backoff_multiplier = 2        # Exponential backoff multiplier
timeout = 30                  # HTTP request timeout in seconds

# Worker settings
worker_sleep = 1              # Sleep time in seconds when queue is empty
batch_size = 500              # Snapshots per batch POST to /api/metrics/batch
